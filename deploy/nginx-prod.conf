server {
    listen 80;
    server_name _;

    # Frontend static files served under /coach/
    location /coach/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /coach/index.html;
    }

    # Proxy API requests to uvicorn backend
    location /coach/api/ {
        rewrite ^/coach(/api/.*)$ $1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Proxy admin API requests to uvicorn backend (specific paths only)
    # The /coach/admin SPA route is handled by the /coach/ try_files fallback
    location /coach/admin/config {
        rewrite ^/coach(/admin/.*)$ $1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /coach/admin/models {
        rewrite ^/coach(/admin/.*)$ $1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Direct /api/ path (used by health checks from within the container)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Redirect bare /coach to /coach/
    location = /coach {
        return 301 /coach/;
    }
}
